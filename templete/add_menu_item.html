<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Menu Item | Premium Delivery</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #facc15;
            --bg: #ffffff;
            --card-bg: #fefce8;
            --text: #1e293b;
            --text-muted: #64748b;
        }
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 20px 40px -15px rgba(234, 179, 8, 0.2);
            width: 100%;
            max-width: 500px;
            border: 1px solid rgba(234, 179, 8, 0.2);
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            text-align: center;
            background: linear-gradient(to right, #eab308, #ca8a04);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }
        .form-group {
            margin-bottom: 1.25rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        input, textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            border: 1px solid #e2e8f0;
            background: white;
            color: #1e293b;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(234, 179, 8, 0.2);
        }
        button {
            width: 100%;
            padding: 0.875rem;
            border-radius: 0.75rem;
            border: none;
            background: linear-gradient(135deg, var(--primary), #eab308);
            color: #1e293b;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 1rem;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(234, 179, 8, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Add Menu Item</h1>
        <p class="subtitle">For {{ restaurant.name }}</p>
        <form action="/handle_add_menu_item/" method="POST">
            {% csrf_token %}
            <input type="hidden" name="restaurant_id" value="{{ restaurant.id }}">
            
            <div class="form-group">
                <label>Item Name</label>
                <input type="text" name="name" placeholder="Pizza, Burger, etc." required>
            </div>
            
            <div class="form-group">
                <label>Price</label>
                <input type="number" step="0.01" name="price" placeholder="199" required>
            </div>
            
            <div class="form-group">
                <label>Image URL</label>
                <input type="text" name="image" placeholder="https://...">
            </div>
            
            <div class="form-group">
                <label>Description</label>
                <textarea name="description" rows="3" placeholder="Describe the deliciousness..."></textarea>
            </div>
            
            <button type="submit">Add to Menu</button>
        </form>
    </div>
</body>
</html>
